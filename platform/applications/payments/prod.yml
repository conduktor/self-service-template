apiVersion: self-serve/v1
kind: ApplicationInstance
metadata:
  application: payments
  name: payments-prod
spec:
  cluster: "kafka-prod" # Replace with your Console cluster name
  serviceAccount: "sa-payments-prod" # Unique per cluster
  policyRef:
    - topic-naming
    - topic-labels
    - topic-rules-prod
    - subject-rules
    - appgroup-restrictions
  defaultCatalogVisibility: PUBLIC
  resources:
    - type: TOPIC
      patternType: PREFIXED
      name: "payments."
    - type: CONSUMER_GROUP
      patternType: PREFIXED
      name: "payments."
    - type: SUBJECT
      patternType: PREFIXED
      name: "payments."

name: Apply Application Resources
on:
  push:
    branches: [main]
    paths: ['applications/**']
  pull_request:
    paths: ['applications/**']

permissions:
  id-token: write
  contents: read

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      app: ${{ steps.find.outputs.app }}
      instance: ${{ steps.find.outputs.instance }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: find
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE=${{ github.event.pull_request.base.sha }}
            HEAD=${{ github.event.pull_request.head.sha }}
          else
            BASE=${{ github.event.before }}
            HEAD=${{ github.sha }}
          fi

          TARGETS=$(git diff --name-only "$BASE" "$HEAD" -- applications/ \
            | awk -F'/' 'NF>=3 {print $2 "/" $3}' \
            | sort -u)

          if [ -z "$TARGETS" ]; then
            echo "::error::No valid app/instance changes detected under applications/"
            exit 1
          fi

          COUNT=$(echo "$TARGETS" | wc -l)
          if [ "$COUNT" -ne 1 ]; then
            echo "::error::Changes must be scoped to a single app/instance folder. Found: $TARGETS"
            exit 1
          fi

          APP=$(echo "$TARGETS" | cut -d/ -f1)
          INSTANCE=$(echo "$TARGETS" | cut -d/ -f2)

          VALID_INSTANCES="dev stag prod"
          if ! echo "$VALID_INSTANCES" | grep -qw "$INSTANCE"; then
            echo "::error::Unknown instance '$INSTANCE'. Must be one of: $VALID_INSTANCES"
            exit 1
          fi

          echo "app=$APP" >> "$GITHUB_OUTPUT"
          echo "instance=$INSTANCE" >> "$GITHUB_OUTPUT"
          echo "Detected target: $APP/$INSTANCE"

  apply:
    needs: detect
    runs-on: ubuntu-latest
    environment: ${{ needs.detect.outputs.app }}-${{ needs.detect.outputs.instance }}
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Install Conduktor CLI
        run: |
          curl -sL https://github.com/conduktor/ctl/releases/latest/download/conduktor-linux-amd64 -o conduktor
          chmod +x conduktor
          sudo mv conduktor /usr/local/bin/

      - name: ${{ github.event_name == 'pull_request' && 'Plan' || 'Apply' }} resources
        run: |
          conduktor apply \
            -f "applications/${{ needs.detect.outputs.app }}/${{ needs.detect.outputs.instance }}" \
            --parallelism 5 \
            --enable-state \
            ${{ github.event_name == 'pull_request' && '--dry-run' || '' }}
        env:
          CDK_API_KEY: ${{ secrets.CDK_API_KEY }}
          CDK_BASE_URL: ${{ vars.CDK_BASE_URL }}
          CDK_STATE_REMOTE_URI: ${{ vars.CDK_STATE_REMOTE_URI }}
